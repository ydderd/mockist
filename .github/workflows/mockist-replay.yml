name: mockist CI

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Run tests
        id: tests
        run: npm test -- --reporter=json --outputFile=vitest-results.json
        continue-on-error: true

      - name: Test failure summary
        if: always() && steps.tests.outcome == 'failure'
        id: failure-summary
        run: |
          if [ -f vitest-results.json ]; then
            node scripts/ci-trajectory-diff.mjs vitest-results.json > test-failure-summary.md
          else
            printf '%s\n' '## mockist test failures' '' 'Test run failed before Vitest wrote JSON results.' > test-failure-summary.md
          fi

      - name: Comment PR with failure summary
        if: always() && github.event_name == 'pull_request' && steps.tests.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('test-failure-summary.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Fail job on test regression
        if: steps.tests.outcome == 'failure'
        run: exit 1
