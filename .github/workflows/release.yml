name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to release (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout tag
        if: github.event_name == 'workflow_dispatch'
        run: git checkout "${{ steps.tag.outputs.value }}"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org
          # Do not cache in release builds (npm trusted publishing guidance).

      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@latest && npm --version

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Smoke-test packed tarball
        run: npm run test:smoke-pack

      - name: Publish to npm (OIDC trusted publishing)
        run: npm publish --access public
        # No NODE_AUTH_TOKEN — auth via GitHub OIDC (id-token: write above).
        # Provenance is generated automatically for public repos using trusted publishing.

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: ${{ steps.tag.outputs.value }}
          generate_release_notes: true
          files: |
            LICENSE
            CHANGELOG.md
